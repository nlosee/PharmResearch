name: "Pharma Regulatory Pulse — Weekly Newsletter"

# Runs automatically every Monday morning and sends without manual review.
# Can also be triggered manually via workflow_dispatch for ad-hoc runs or testing.
#
# Required GitHub Actions secrets:
#   OPENAI_API_KEY   — OpenAI API key (https://platform.openai.com/api-keys)
#   TAVILY_API_KEY   — Tavily search API key (https://tavily.com)
#   RESEND_API_KEY   — Resend transactional email key (https://resend.com)
#   OPENFDA_API_KEY  — openFDA API key (optional, https://open.fda.gov/apis/authentication)
#   PUBMED_API_KEY   — NCBI/PubMed API key (optional, https://www.ncbi.nlm.nih.gov/account)
#   OPENAI_MODEL     — Optional model override (defaults to gpt-4.1-mini-2025-04-14)

on:
  schedule:
    # Every Monday at 2 PM UTC (7 AM PT / 10 AM ET)
    - cron: '0 14 * * 1'

  workflow_dispatch:
    inputs:
      passes:
        description: 'Monte Carlo synthesis passes (default: 3, use 1 for quick test)'
        required: false
        default: '3'
        type: string
      dry_run:
        description: 'Dry run — generate and archive draft but do NOT send emails'
        required: false
        default: false
        type: boolean

jobs:
  generate-and-send:
    name: Generate & Send Newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 15


    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch private sheets data (Subscribers & Social Roster)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python fetch_sheets.py

      - name: Generate and send newsletter
        run: |
          FLAGS="--passes ${{ github.event.inputs.passes || '3' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "DRY RUN — newsletter will be generated but not sent."
          fi
          python main.py $FLAGS
        env:
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:    ${{ secrets.OPENAI_MODEL }}
          TAVILY_API_KEY:  ${{ secrets.TAVILY_API_KEY }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          PUBMED_API_KEY:  ${{ secrets.PUBMED_API_KEY }}
          SMTP_HOST:       smtp.gmail.com
          SMTP_PORT:       "587"
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}

      # Update the generation log — prevents GitHub 60-day inactivity auto-disable
      - name: Update generation log
        run: |
          MODE="sent"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then MODE="dry-run"; fi
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') — Newsletter ${MODE} (passes: ${{ github.event.inputs.passes || '3' }})" >> generation_log.txt

      # Commit the archived draft, raw data, history, and log for audit trail
      - name: Commit and push pipeline artifacts
        run: |
          git config user.name "Pharma Pulse Bot"
          git config user.email "actions@github.com"
          git add drafts/ archive/ generation_log.txt published_history.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📬 Newsletter sent — $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
