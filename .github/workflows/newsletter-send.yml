name: "Pharma Regulatory Pulse — Resend Latest Draft"

# Manual-only workflow: picks the most recent draft from drafts/ and sends it.
# Use this to re-send or retry delivery after the main newsletter workflow has
# already generated a draft.

on:
  workflow_dispatch:
    inputs:
      draft_date:
        description: 'Draft date to send (YYYY-MM-DD). Leave blank for most recent.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — format to HTML but do not send emails'
        required: false
        default: false
        type: boolean

concurrency:
  group: pharmresearch-newsletter-main
  cancel-in-progress: false

jobs:
  send-draft:
    name: Send Draft Newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch private sheets data (Subscribers & Social Roster)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SUBSCRIBERS_CSV: ${{ secrets.SUBSCRIBERS_CSV }}
        run: python fetch_sheets.py

      - name: Find draft to send
        id: draft
        run: |
          DATE="${{ github.event.inputs.draft_date }}"
          if [ -n "$DATE" ]; then
            DRAFT_PATH="drafts/${DATE}.md"
          else
            # Pick the most recent draft by filename (YYYY-MM-DD.md sorts naturally)
            DRAFT_PATH=$(ls drafts/*.md 2>/dev/null | sort -r | head -n1)
          fi

          if [ -z "$DRAFT_PATH" ] || [ ! -f "$DRAFT_PATH" ]; then
            echo "❌ No draft found."
            echo "Available drafts:"
            ls drafts/ 2>/dev/null || echo "  (none)"
            exit 1
          fi

          echo "📄 Sending draft: $DRAFT_PATH"
          echo "draft_path=$DRAFT_PATH" >> "$GITHUB_OUTPUT"

      - name: Send newsletter from draft
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
            echo "DRY RUN — HTML will be generated but not sent."
          fi
          python send_draft.py "${{ steps.draft.outputs.draft_path }}" $FLAGS
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: Update log after send
        run: |
          MODE="resent"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then MODE="dry-run"; fi
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') — ${MODE}: ${{ steps.draft.outputs.draft_path }}" >> generation_log.txt

      - name: Commit send log
        run: |
          git config user.name "Pharma Pulse Bot"
          git config user.email "actions@github.com"
          git add generation_log.txt
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📬 Newsletter resent — $(date -u '+%Y-%m-%d')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying after a fresh fetch..."
            sleep 5
          done
          echo "Unable to push after 3 attempts."
          exit 1
